<div class="flex flex-col w-full mb-3">
  <div class="flec justify-between items-center">
    <div class="tab tabs-border tabs-lg text-primary">
      @for (tab of tabs; track $index) {
        <button
          class="tab"
          [hidden]="
            tab.value === 'roles' && !accountService.currentUser()?.roles?.includes('admin')
          "
          [class.tab-active]="activeTab === tab.value"
          (click)="setTab(tab.value)"
        >
        {{tab.label}}
    </button>
      }
    </div>
  </div>
</div>


@if (activeTab === 'roles') {
    <app-user-management />
}

@if (activeTab === 'photos') {
    <app-photo-management />
}
